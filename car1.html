<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dettaglio Auto</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* =========================
   SYSTEM TOKENS
========================= */
:root {
  --bg-0: #050c14;
  --bg-1: #0b1a28;
  --surface: color-mix(in srgb, white 9%, transparent);
  --surface-border: color-mix(in srgb, white 22%, transparent);

  --accent: #7ddcff;
  --accent-soft: color-mix(in srgb, var(--accent) 30%, transparent);

  --radius-xl: 28px;
  --radius-lg: 20px;

  --shadow-depth: 
    0 30px 70px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.06);

  --ease-fluid: cubic-bezier(.25,.8,.25,1);
}

/* =========================
   BASE
========================= */
body {
  margin: 0;
  padding: clamp(16px, 3vw, 40px);
  font-family: 'Poppins', system-ui, sans-serif;
  color: #fff;
  background:
    radial-gradient(120% 120% at 20% 20%, var(--bg-1), var(--bg-0));
  min-height: 100svh;
  display: grid;
  place-items: center;
}

/* =========================
   CONTAINER (CONTENT-FIRST)
========================= */
.container {
  width: min(900px, 100%);
  padding: clamp(22px, 4vw, 36px);
  border-radius: var(--radius-xl);
  background: var(--surface);
  border: 1px solid var(--surface-border);
  box-shadow: var(--shadow-depth);
  animation: rise .9s var(--ease-fluid) forwards;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(32px); }
  to   { opacity: 1; transform: none; }
}

/* =========================
   LAYOUT (RESPONSIVE BY NATURE)
========================= */
.top {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: clamp(24px, 4vw, 42px);
}

@media (max-width: 720px) {
  .top { grid-template-columns: 1fr; }
}

/* =========================
   IMAGE (QUIETLY PREMIUM)
========================= */
.img-wrap {
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  isolation: isolate;
}

.img-wrap img {
  width: 100%;
  display: block;
  transition: transform 1.2s var(--ease-fluid);
}

.img-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    transparent 40%,
    rgba(0,0,0,.35)
  );
  opacity: .6;
  z-index: 1;
}

.img-wrap:hover img {
  transform: scale(1.04);
}

/* =========================
   INFO (TYPOGRAPHY-LED)
========================= */
.info h1 {
  margin: 0 0 14px;
  font-size: clamp(1.8rem, 4vw, 2.4rem);
  font-weight: 700;
  line-height: 1.15;
}

.info p {
  margin: 0 0 12px;
  font-size: 1.05rem;
  line-height: 1.65;
  opacity: .9;
}

/* =========================
   ACTIONS (NO SHOW-OFF)
========================= */
.back {
  margin-top: 20px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 14px 26px;
  border-radius: 14px;
  background: transparent;
  border: 1px solid var(--surface-border);
  color: inherit;
  font-weight: 600;
  text-decoration: none;
  transition: 
    background .4s ease,
    transform .4s ease;
}

.back:hover {
  background: color-mix(in srgb, var(--accent) 18%, transparent);
  transform: translateY(-2px);
}

/* =========================
   LINK
========================= */
.wiki-link {
  display: inline-block;
  margin-top: 12px;
  color: var(--accent);
  font-weight: 600;
  text-decoration: none;
  transition: transform .3s ease;
}

.wiki-link:hover {
  transform: translateX(6px);
}

/* =========================
   MOTION SAFETY
========================= */
@media (prefers-reduced-motion: reduce) {
  * {
    animation: none !important;
    transition: none !important;
  }
}

  </style>
</head>
<body>
  <div class="container" id="detailContainer">
    <a class="back" href="home1.html">← Torna al Garage</a>
    <br><br>
    <div id="detailContent"></div>
  </div>

  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function renderDetail(car) {
        const target = document.getElementById('detailContent');
        if (!car) {
            target.innerHTML = '<p>Auto non trovata.</p>';
            return;
        }

        // Costruisce automaticamente il percorso dell'immagine targa 3D
        const plateImg = `images-01/${car.model}_plate.jpg`;

        target.innerHTML = `
            <div class="top">
                <div class="img-wrap">
                    <img src="${car.imageFront}" alt="${car.brand} ${car.model}" onerror="this.src='images/placeholder.jpg'">
                </div>
                <div class="info">
                    <h1>${car.brand} ${car.model}</h1>
                    <p><strong>Posti:</strong> ${car.seats}</p>
                    <p><strong>Nazionalità marchio:</strong> ${car.nationality || '—'}</p><br>
                    <div class="targa">
                        <strong>Targa:</strong><br>
                        <img src="${plateImg}" alt="targa ${car.model}" style="width:200px; margin-top:8px; border-radius:8px;" onerror="this.style.opacity=0.3">
                    </div>
                    <p><strong>Proprietario:</strong> ${car.owner}</p>
                    <p><strong>Per saperne di più sull'auto</strong></p>
                    <a href="${car.wiki}" target="_blank" class="wiki-link">Vai alla pagina Wikipedia ↗</a>
                    <br>
                    <p>${car.info}</p>
                </div>
            </div>
        `;
    }

    document.addEventListener('DOMContentLoaded', () => {
      const id = getQueryParam('id');
      const CarModelNotReallyOwned = "L'auto mostrata si riferisce ad un modello aziendale ad uso promiscuo, non personalmente posseduto da chi viene designato come proprietario, il quale però adopera il mezzo.";
      let carsData = [];

      try {
        const raw = localStorage.getItem('cars_data');
        if (raw) carsData = JSON.parse(raw);
      } catch (e) {
        console.error('Errore parsing cars_data dal localStorage', e);
      }

      if (!carsData || carsData.length === 0) {
        carsData = [
          { id:1, brand:"Citroen", model:"C3", plate:"EL 098 PZ", seats:5, flag:"🇫🇷", imageFront:"images-01/C3_front.jpg", imageRear:"images-01/C3_rear.jpg", nationality:"Francia", owner: "Marina", wiki: "https://it.wikipedia.org/wiki/Citro%C3%ABn_C3_(2009)", info:"" },
          { id:2, brand:"Renault", model:"Clio", plate:"EN 883 ET", seats:5, flag:"🇫🇷", imageFront:"images-01/Clio_front.jpg", imageRear:"images-01/Clio_rear.jpg", nationality:"Francia", owner: "Filippo", wiki: "https://it.wikipedia.org/wiki/Renault_Clio_III", info:""},
          { id:3, brand:"Peugeot", model:"308", plate:"HB 669 DB", seats:5, flag:"🇫🇷", imageFront:"images-01/308_front.jpg", imageRear:"images-01/308_rear.jpg", nationality:"Francia", owner: "Riccardo", wiki: "https://it.wikipedia.org/wiki/Peugeot_308_(2021)", info:CarModelNotReallyOwned}
        ];
      }

      const car = carsData.find(c => String(c.id) === String(id));
      renderDetail(car);
    });
  </script>
  <script>
    document.addEventListener("mousemove", e => {
        const x = (window.innerWidth / 2 - e.clientX) / 90;
        const y = (window.innerHeight / 2 - e.clientY) / 90;
        document.body.style.setProperty("--tiltY", x + "deg");
        document.body.style.setProperty("--tiltX", -y + "deg");
    });
</script>
</body>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const link = document.querySelector('.wiki-link');
    if (!link) return;

    // Crea popup
    const previewBox = document.createElement('div');
    previewBox.style.position = 'absolute';
    previewBox.style.padding = '12px';
    previewBox.style.background = 'rgba(0,0,0,0.85)';
    previewBox.style.borderRadius = '10px';
    previewBox.style.color = 'white';
    previewBox.style.width = '280px';
    previewBox.style.fontSize = '0.9rem';
    previewBox.style.boxShadow = '0 4px 20px rgba(0,0,0,0.5)';
    previewBox.style.display = 'none';
    previewBox.style.zIndex = '999';
    document.body.appendChild(previewBox);

    link.addEventListener('mouseenter', async (e) => {
      const url = link.href;
      const title = decodeURIComponent(url.split('/wiki/')[1]);
      if (!title) return;

      try {
        const res = await fetch(`https://it.wikipedia.org/api/rest_v1/page/summary/${title}`);
        const data = await res.json();
        previewBox.innerHTML = `
          <strong>${data.title}</strong><br>
          <p style="margin-top:4px;">${data.extract ? data.extract.slice(0, 180) + '...' : 'Anteprima non disponibile.'}</p>
        `;
        previewBox.style.top = (e.pageY + 12) + 'px';
        previewBox.style.left = (e.pageX + 12) + 'px';
        previewBox.style.display = 'block';
      } catch (err) {
        previewBox.innerHTML = '<em>Anteprima non disponibile.</em>';
        previewBox.style.display = 'block';
      }
    });

    link.addEventListener('mousemove', (e) => {
      previewBox.style.top = (e.pageY + 12) + 'px';
      previewBox.style.left = (e.pageX + 12) + 'px';
    });

    link.addEventListener('mouseleave', () => {
      previewBox.style.display = 'none';
    });
  });
</script>

</html>
